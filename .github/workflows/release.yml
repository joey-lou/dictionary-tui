name: Release

# Tag on main → route by prefix:
#   v*       → GitHub Release (binaries) + crates.io publish
#   packs-v* → GitHub Release (pack tarballs) + sync catalog to main

on:
  push:
    tags:
      - "v*"
      - "packs-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag must be on latest main
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "Release tags must point at the current main branch tip."
            echo "  tag:  $(git rev-parse HEAD)"
            echo "  main: $(git rev-parse origin/main)"
            exit 1
          fi

      - name: Validate tag prefix
        run: |
          case "${{ github.ref_name }}" in
            v*)       echo "App release: ${{ github.ref_name }}" ;;
            packs-v*) echo "Pack release: ${{ github.ref_name }}" ;;
            *)        echo "Unsupported tag: ${{ github.ref_name }}"; exit 1 ;;
          esac

      - name: Validate v-tag semver
        if: startsWith(github.ref_name, 'v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "App release tags must be semver: vX.Y.Z (got: ${{ github.ref_name }})"
            exit 1
          fi
          crate_version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          if [ "$tag_version" = "$crate_version" ]; then
            echo "Tag ${{ github.ref_name }} matches Cargo.toml ($crate_version) — bump the tag version to release"
            exit 1
          fi
          if [ "$(printf '%s\n' "$tag_version" "$crate_version" | sort -V | head -1)" = "$tag_version" ]; then
            echo "Tag ${{ github.ref_name }} must be newer than Cargo.toml ($crate_version)"
            exit 1
          fi
          echo "Will release $tag_version (Cargo.toml is $crate_version until workflow syncs)"

  ci:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set version from tag
        if: startsWith(github.ref_name, 'v')
        run: |
          chmod +x scripts/set-version-from-tag.sh
          ./scripts/set-version-from-tag.sh "${GITHUB_REF_NAME}"

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Verify publishable crate size
        if: startsWith(github.ref_name, 'v')
        run: |
          cargo package --quiet
          size=$(stat -c%s target/package/dictionary-tui-*.crate)
          echo "Crate size: $size bytes"
          test "$size" -lt 10485760

  release-packs:
    needs: [validate, ci]
    if: startsWith(github.ref_name, 'packs-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build pack tarballs
        run: |
          chmod +x scripts/build-pack-release.sh
          ./scripts/build-pack-release.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ```bash
            dictionary-tui pack install --all
            ```

            Checksums: `packs/catalog.json` on main.
          files: dist/*.tar.gz

      - name: Sync catalog to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp packs/catalog.json /tmp/pack-catalog.json
          git fetch origin main
          git checkout main
          cp /tmp/pack-catalog.json packs/catalog.json
          git add packs/catalog.json
          git diff --staged --quiet || git commit -m "Update pack catalog for ${{ github.ref_name }}"
          git push origin main

  build-binaries:
    needs: [validate, ci]
    if: startsWith(github.ref_name, 'v')
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            asset: dictionary-tui-linux-x86_64
          - os: macos-latest
            label: macos-arm64
            asset: dictionary-tui-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          chmod +x scripts/set-version-from-tag.sh
          ./scripts/set-version-from-tag.sh "${GITHUB_REF_NAME}"

      - name: Build release binary
        run: cargo build --release

      - name: Prepare artifact
        run: |
          cp target/release/dictionary-tui "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release-app:
    needs: build-binaries
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

  publish-crate:
    needs: release-app
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          chmod +x scripts/set-version-from-tag.sh
          ./scripts/set-version-from-tag.sh "${GITHUB_REF_NAME}"

      - name: Publish to crates.io
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  sync-version:
    needs: publish-crate
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Cargo.toml version to main
        run: |
          chmod +x scripts/set-version-from-tag.sh
          ./scripts/set-version-from-tag.sh "${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp Cargo.toml /tmp/Cargo.toml
          git fetch origin main
          git checkout main
          cp /tmp/Cargo.toml Cargo.toml
          git add Cargo.toml
          git diff --staged --quiet || git commit -m "Bump version to ${GITHUB_REF_NAME#v} for ${{ github.ref_name }}"
          git push origin main
