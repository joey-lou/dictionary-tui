name: Pack release

on:
  push:
    tags:
      - "packs-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build pack tarballs
        run: |
          chmod +x scripts/build-pack-release.sh
          ./scripts/build-pack-release.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Dictionary pack tarballs for [dictionary-tui](https://github.com/joey-lou/dictionary-tui).

            ```bash
            dictionary-tui pack install --all
            ```

            Checksums are in `packs/catalog.json` on the main branch.
          files: dist/*.tar.gz
          draft: false
          prerelease: false

      - name: Sync catalog to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp packs/catalog.json /tmp/pack-catalog.json
          git fetch origin main
          git checkout main
          cp /tmp/pack-catalog.json packs/catalog.json
          git add packs/catalog.json
          git diff --staged --quiet || git commit -m "Update pack catalog for ${{ github.ref_name }}"
          git push origin main
